

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pedidos</title>
<style>
body{font-family:Arial;margin:0;background:#f5f5f5}
.header{padding:15px;text-align:center;font-size:20px;font-weight:bold}
.lista{padding:10px;padding-bottom:120px}
.item{background:#fff;margin-bottom:10px;padding:15px;border-radius:15px;display:flex;justify-content:space-between;align-items:center}
.nombre{font-weight:bold}
.cantidad{font-size:20px;font-weight:bold}
.btn-guardar{width:100%;padding:15px;border:none;background:#22c55e;color:white;border-radius:15px;font-size:16px}
.footer{position:fixed;bottom:0;width:100%;display:flex}
.footer button{flex:1;padding:15px;border:none;font-size:16px}
.activo{background:#22c55e;color:white}
.inactivo{background:#ddd}
.card{background:white;margin:10px;padding:15px;border-radius:15px}
</style>
</head>
<body>

<div class="header" id="titulo">Tomar pedido</div>

<div id="tomar" class="lista"></div>
<div id="ver" class="lista" style="display:none"></div>

<div class="footer">
  <button id="btnTomar" class="activo" onclick="cambiar('tomar')">Tomar pedido</button>
  <button id="btnVer" class="inactivo" onclick="cambiar('ver')">Ver pedidos</button>
</div>

<script>
const productosBase=[
"Sancocho de Pollo",
"Sancocho de Gallina Huevera",
"Sancocho de Gallina Pierna",
"Sancocho de Gallina Pechuga",
"Carne de cerdo a la brasa",
"Pechuga a la brasa",
"Pollo a la brasa"
];

let productos=productosBase.map(n=>({nombre:n,cantidad:0}));

function renderTomar(){
 const cont=document.getElementById('tomar');
 cont.innerHTML='';

 productos.forEach((p,i)=>{
  const div=document.createElement('div');
  div.className='item';

  let startX=0;
  div.addEventListener('touchstart',e=>startX=e.touches[0].clientX);
  div.addEventListener('touchend',e=>{
    const diff=e.changedTouches[0].clientX-startX;
    if(diff>50) p.cantidad++;
    else if(diff<-50){p.cantidad--;if(p.cantidad<0)p.cantidad=0}
    renderTomar();
  });

  div.innerHTML=`<div class='nombre'>${p.nombre}</div><div class='cantidad'>${p.cantidad}</div>`;
  cont.appendChild(div);
 });

 const btn=document.createElement('button');
 btn.className='btn-guardar';
 btn.innerText='Guardar pedido';
 btn.onclick=guardarPedido;
 cont.appendChild(btn);
}

function guardarPedido(){
 const pedido=productos
   .filter(p=>p.cantidad>0)
   .map(p=>({nombre:p.nombre,cantidad:p.cantidad})); // ✅ copia real


 if(pedido.length===0)return alert('No hay productos');

 let pedidos=JSON.parse(localStorage.getItem('pedidos')||'[]');
 pedidos.push(pedido);
 localStorage.setItem('pedidos',JSON.stringify(pedidos));

 productos.forEach(p=>p.cantidad=0);
 renderTomar();
 alert('Pedido guardado');
}

function renderVer(){
 const cont=document.getElementById('ver');
 cont.innerHTML='';
 const pedidos=JSON.parse(localStorage.getItem('pedidos')||'[]');

 pedidos.forEach((ped,i)=>{
  const card=document.createElement('div');
  card.className='card';

  let html=`<b>Pedido ${i+1}</b><br>`;
  ped.forEach(p=>{
    html+=`${p.nombre} x ${p.cantidad}<br>`;
  });

  card.innerHTML=html;
  cont.appendChild(card);
 });
}


function cambiar(vista){
 if(vista==='tomar'){
  document.getElementById('tomar').style.display='block';
  document.getElementById('ver').style.display='none';
  document.getElementById('btnTomar').className='activo';
  document.getElementById('btnVer').className='inactivo';
 }
 else{
  document.getElementById('tomar').style.display='none';
  document.getElementById('ver').style.display='block';
  document.getElementById('btnTomar').className='inactivo';
  document.getElementById('btnVer').className='activo';
  
  renderVer(); // 👈 importante
 }
}



function renderVer(){
 const cont=document.getElementById('ver');
 cont.innerHTML='';

 const pedidos=JSON.parse(localStorage.getItem('pedidos')||'[]');

 if(pedidos.length===0){
   cont.innerHTML = "<p style='text-align:center'>No hay pedidos</p>";
   return;
 }

 // 🔴 BOTÓN BORRAR TODO
 const btnBorrar=document.createElement('button');
 btnBorrar.className='btn-guardar';
 btnBorrar.style.background='#ef4444';
 btnBorrar.innerText='Borrar todos los pedidos';
 btnBorrar.onclick=borrarPedidos;
 cont.appendChild(btnBorrar);

 pedidos.forEach((ped,i)=>{
  const card=document.createElement('div');
  card.className='card';

  let html=`<b>Pedido ${i+1}</b><br>`;
  ped.forEach(p=>{
    html+=`${p.nombre} x ${p.cantidad}<br>`;
  });

  card.innerHTML=html;
  cont.appendChild(card);
 });
}


function borrarPedidos(){
 if(confirm("¿Borrar todos los pedidos?")){
   localStorage.removeItem('pedidos');
   renderVer();
 }
}




renderTomar();
renderVer(); // 👈 asegura que esté lista

</script>

</body>
</html>
